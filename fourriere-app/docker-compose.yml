version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fourriere-postgres
    environment:
      POSTGRES_DB: fourriere_db
      POSTGRES_USER: fourriere_user
      POSTGRES_PASSWORD: fourriere_pass
    ports:
      - "5433:5432"
    volumes:
      - fourriere_postgres_data:/var/lib/postgresql/data
      - ./init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql
    networks:
      - fourriere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fourriere_user -d fourriere_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fourriere-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: fourriere_user
      KC_DB_PASSWORD: fourriere_pass
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fourriere-network
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fourriere-backend
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fourriere_db
      SPRING_DATASOURCE_USERNAME: fourriere_user
      SPRING_DATASOURCE_PASSWORD: fourriere_pass
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/fourriere
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fourriere/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: http://localhost:4202
    ports:
      - "8086:8080"
    networks:
      - fourriere-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fourriere-frontend
    depends_on:
      - backend
    ports:
      - "4202:80"
    networks:
      - fourriere-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fourriere-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fourriere.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5051:80"
    volumes:
      - fourriere_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - fourriere-network

networks:
  fourriere-network:
    driver: bridge

volumes:
  fourriere_postgres_data:
  fourriere_pgadmin_data:
