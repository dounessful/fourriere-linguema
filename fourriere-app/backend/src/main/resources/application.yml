spring:
  profiles:
    active: dev
  application:
    name: fourriere-backend

# ---------------------------------------------------------------------
# Keycloak Admin API — utilisé pour provisionner les users applicatifs
# ---------------------------------------------------------------------
keycloak:
  admin:
    url: ${KEYCLOAK_ADMIN_URL:http://localhost:8280}
    realm: ${KEYCLOAK_ADMIN_REALM:fourriere}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:fourriere-admin-sync}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
    enabled: ${KEYCLOAK_ADMIN_ENABLED:true}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8280/realms/fourriere}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8280/realms/fourriere/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8085}
  # Honore les headers X-Forwarded-* quand on est derrière un proxy (Caddy / Cloudflare)
  forward-headers-strategy: native
  error:
    include-message: always
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

# Configuration du rate limiter
rate-limit:
  # Liste CSV des IP/CIDR des proxies de confiance (ex: CF edge) qui peuvent
  # injecter X-Forwarded-For. Vide par défaut = aucun proxy de confiance.
  trusted-proxies: ${RATE_LIMIT_TRUSTED_PROXIES:}
  auth-per-minute: ${RATE_LIMIT_AUTH:5}
  search-per-minute: ${RATE_LIMIT_SEARCH:30}
  detail-per-minute: ${RATE_LIMIT_DETAIL:30}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    operationsSorter: method
